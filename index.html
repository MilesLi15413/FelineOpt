<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FelineOpt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #0A0F1E;
      color: #F1F5F9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .logo span { color: #38BDF8; }

    .slogan {
      font-size: 1rem;
      color: #94A3B8;
      font-weight: 400;
    }

    .chat-box {
      width: 100%;
      max-width: 640px;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 16px;
      overflow: hidden;
    }

    .messages {
      height: 360px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg-user { align-self: flex-end; align-items: flex-end; }
    .msg-assistant { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.875rem;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg-user .bubble    { background: #38BDF8; color: #0A0F1E; border-bottom-right-radius: 3px; }
    .msg-assistant .bubble { background: #273548; color: #F1F5F9; border-bottom-left-radius: 3px; }

    .empty-hint {
      margin: auto;
      text-align: center;
      color: #475569;
      font-size: 0.875rem;
    }

    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #94A3B8;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #334155;
      background: #273548;
    }

    .chat-input {
      flex: 1;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #F1F5F9;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: #38BDF8; }
    .chat-input::placeholder { color: #475569; }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 8px;
      background: #38BDF8;
      color: #0A0F1E;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #0EA5E9; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo">Feline<span>Opt</span></div>
    <div class="slogan">Beware — Capitalism is making your cats sick.</div>
  </div>

  <div class="chat-box">
    <div class="messages" id="messages">
      <div class="empty-hint" id="emptyHint">Ask anything about cat food, ingredients, or recalls…</div>
    </div>
    <div class="input-row">
      <input class="chat-input" id="chatInput" type="text" placeholder="e.g. What is Red 40 and is it safe for cats?" />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    document.getElementById('chatInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    const history = [];

    function addBubble(role, text) {
      const hint = document.getElementById('emptyHint');
      if (hint) hint.remove();

      const msgs = document.getElementById('messages');
      const wrap = document.createElement('div');
      wrap.className = `msg msg-${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const hint = document.getElementById('emptyHint');
      if (hint) hint.remove();
      const msgs = document.getElementById('messages');
      const wrap = document.createElement('div');
      wrap.className = 'msg msg-assistant';
      wrap.id = 'typing-indicator';
      wrap.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      document.getElementById('sendBtn').disabled = true;

      addBubble('user', text);
      history.push({ role: 'user', content: text });
      addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addBubble('assistant', `Error: ${err?.error || res.statusText}`);
          document.getElementById('sendBtn').disabled = false;
          return;
        }

        const bubble = addBubble('assistant', '');
        const msgs = document.getElementById('messages');
        let fullText = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          for (const line of chunk.split('\n')) {
            if (!line.startsWith('data:')) continue;
            const data = line.slice(5).trim();
            if (data === '[DONE]') break;
            try {
              const json = JSON.parse(data);
              if (json.type === 'content_block_delta' && json.delta?.text) {
                fullText += json.delta.text;
                bubble.textContent = fullText;
                msgs.scrollTop = msgs.scrollHeight;
              }
            } catch {}
          }
        }

        history.push({ role: 'assistant', content: fullText });
      } catch (e) {
        removeTyping();
        addBubble('assistant', `Something went wrong: ${e.message}`);
      }

      document.getElementById('sendBtn').disabled = false;
    }
  </script>
</body>
</html>
